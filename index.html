<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacecraft Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bottom-bar">
        <div id="time-warp-indicator">WARP</div>

        <div class="bar-column">
            <div class="section-header">[ VEHICLE ]</div>
            <div class="info-row">
                <span class="var-name">VEL</span>
                <span class="data-value" id="velocity">0.0</span>
                <span class="data-unit">m/s</span>
            </div>
            <div class="info-row">
                <span class="var-name">ALT</span>
                <span class="data-value" id="altitude">0.0</span>
                <span class="data-unit">km</span>
            </div>
            <div class="info-row">
                <span class="var-name">THR</span>
                <span class="data-value" id="thrust-status">OFF</span>
            </div>
            <div class="info-row">
                <span class="var-name">SAS</span>
                <span class="data-value" id="sas-status">OFF</span>
            </div>
        </div>

        <div class="bar-divider">|</div>

        <div class="bar-column">
            <div class="section-header">[ ORBIT ]</div>
            <div class="info-row">
                <span class="var-name">PER</span>
                <span class="data-value" id="perigee">0.0</span>
                <span class="data-unit">km</span>
            </div>
            <div class="info-row">
                <span class="var-name">APO</span>
                <span class="data-value" id="apogee">0.0</span>
                <span class="data-unit">km</span>
            </div>
            <div class="info-row">
                <span class="var-name">SMA</span>
                <span class="data-value" id="semi-major-axis">0.0</span>
                <span class="data-unit">km</span>
            </div>
            <div class="info-row">
                <span class="var-name">PRD</span>
                <span class="data-value" id="orbital-period">0.0</span>
                <span class="data-unit">min</span>
            </div>
            <div class="info-row">
                <span class="var-name">ECC</span>
                <span class="data-value" id="eccentricity">0.0</span>
            </div>
        </div>

        <div class="bar-divider">|</div>

        <div class="bar-column">
            <div class="section-header">[ ATTITUDE ]</div>
            <div class="info-row">
                <span class="var-name">ORI</span>
                <span class="data-value" id="orientation">P: 0.0° Y: 0.0° R: 0.0°</span>
            </div>
            <div class="info-row">
                <span class="var-name">WRP</span>
                <span class="data-value" id="time-warp">1x</span>
            </div>
        </div>
    </div>

    <!-- Import Three.js core -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>

    <!-- Post-processing dependencies (must load after Three.js core) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/postprocessing/Pass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <!-- Import application scripts -->
    <script src="js/scaleManager.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/planet.js"></script>
    <script src="js/spacecraft.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
